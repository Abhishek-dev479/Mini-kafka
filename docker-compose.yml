version: '3.8'

services:
  server:
    build: .
    ports:
      - "8080:8080"
      - "3000:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 8080"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - kafka-network

  producer:
    build: .
    depends_on:
      server:
        condition: service_healthy
    command: node producer.js
    environment:
      - KAFKA_HOST=server
    networks:
      - kafka-network

  consumer:
    build: .
    command: node consumer.js
    depends_on:
      server:
        condition: service_healthy
    environment:
      - KAFKA_HOST=server
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge