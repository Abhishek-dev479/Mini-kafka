<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Kafka Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { margin-bottom: 20px; }
    .message { background-color: #e9ecef; padding: 10px; margin: 5px 0; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Mini Kafka Dashboard</h1>

    <div class="row">
      <div class="col-md-8">
        <div id="topics" class="card p-3">
          <h2>Topics</h2>
          <div id="topics-list"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">
          <h2>Produce Message</h2>
          <form id="produceForm">
            <div class="mb-3">
              <label for="topic" class="form-label">Topic</label>
              <input type="text" class="form-control" id="topic" required>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="3" required></textarea>
            </div>
            <div class="mb-3">
              <label for="key" class="form-label">Key (optional)</label>
              <input type="text" class="form-control" id="key">
            </div>
            <button type="submit" class="btn btn-primary">Produce</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal for viewing messages -->
    <div class="modal fade" id="messagesModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Messages</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="messages-content">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
